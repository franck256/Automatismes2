<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Évaluation Fractions & Relatifs - 4ème</title>
    <style>
        :root {
            --bg-color: #0b0b0c;
            --card-bg: #16161a;
            --accent-color: #39ff14;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border-color: #2c2c2e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            max-width: 750px;
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 800;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .header .subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            background-color: #222227;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 15px;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .consigne {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: var(--text-main);
        }
        
        .question-box {
            background-color: #1e1e24;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        /* ALIGNEMENT FLEXBOX PARFAIT (Fractions, Signes, Crochets) */
        .math-line {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
            vertical-align: middle;
        }

        .math-fraction {
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 4px;
            vertical-align: middle;
        }
        
        .math-num {
            display: block;
            border-bottom: 2px solid var(--text-main);
            padding-bottom: 2px;
            text-align: center;
        }
        
        .math-den {
            display: block;
            padding-top: 2px;
            text-align: center;
        }

        .math-bracket {
            font-size: 42px;
            font-weight: 300;
            line-height: 1;
            display: inline-block;
            vertical-align: middle;
            color: #ffffff;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button.action-btn {
            flex: 1;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-start {
            background-color: var(--accent-color);
            color: #000000;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: #000000;
        }

        .btn-skip {
            background-color: #2c2c2e;
            color: #e5e5ea;
            border: 1px solid #48484a;
        }
        
        .progress-bar {
            background-color: #2c2c2e;
            border-radius: 4px;
            height: 6px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .indicator {
            text-align: right;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .result-box {
            background: #1e1e24;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            margin-top: 20px;
            text-align: center;
        }

        .score-display {
            font-size: 48px;
            font-weight: 800;
            color: var(--accent-color);
            margin: 15px 0;
        }
        
        table.bilan {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }

        table.bilan th, table.bilan td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .row-correct { color: var(--accent-color); }
        .row-incorrect { color: #ff453a; }
        .row-skipped { color: #e5e5ea; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Fractions & Nombres Relatifs</h1>
        <div class="subtitle">Série d'Évaluation de 10 Questions Aléatoires Complexes</div>
    </div>

    <!-- PANEL 1 : ENREGISTREMENT -->
    <div id="panel-login" class="step-panel" style="display: block;">
        <div style="margin-bottom: 20px;">
            <label for="student-name">Nom et Prénom de l'élève :</label>
            <input type="text" id="student-name" placeholder="Ex: Lucas Bernard" autocomplete="off">
        </div>
        <button class="btn-start" onclick="startTest()">Démarrer l'évaluation</button>
    </div>

    <!-- PANEL 2 : QUIZ -->
    <div id="panel-quiz" class="step-panel" style="display: none;">
        <div class="indicator">Question <span id="current-q">1</span> / 10</div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        
        <div class="consigne" id="q-consigne">Calcule et écris le résultat sous forme simplifiée :</div>
        
        <div class="question-box" id="q-box"></div>
        
        <div style="background-color: #1e1e24; padding: 20px; border-radius: 8px; border: 1px solid var(--border-color);">
            <div>
                <label for="user-answer" id="label-reponse">Ta réponse :</label>
                <input type="text" id="user-answer" placeholder="Saisis ton résultat" autocomplete="off">
            </div>
            
            <div class="btn-group">
                <button class="action-btn btn-skip" onclick="skipQuestion()">Passer ⏭️</button>
                <button class="action-btn btn-submit" id="btn-validate" onclick="submitAnswer()">Valider la réponse</button>
            </div>
        </div>
    </div>

    <!-- PANEL 3 : RESULTATS -->
    <div id="panel-results" class="step-panel" style="display: none;">
        <div class="result-box">
            <h2>Fin de l'évaluation</h2>
            <p>Élève : <span id="res-name" style="font-weight: bold; color: #fff;">...</span></p>
            <div class="score-display" id="res-grade">0 / 10</div>
        </div>

        <h3 style="margin-top:30px; color: var(--text-main); font-size:15px; text-transform:uppercase; border-bottom:1px solid var(--border-color); padding-bottom:8px;">Bilan détaillé</h3>
        <table class="bilan">
            <thead>
                <tr>
                    <th>Type d'exercice</th>
                    <th>Énoncé Mathématique</th>
                    <th>Ta réponse</th>
                    <th>Correction attendue</th>
                </tr>
            </thead>
            <tbody id="bilan-table-body"></tbody>
        </table>

        <button class="btn-start" style="margin-top: 30px;" onclick="restartTest()">Recommencer une série</button>
    </div>
</div>

<script>
    let quizQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let studentName = "";

    function gcd(a, b) { return b === 0 ? Math.abs(a) : gcd(b, a % b); }
    
    function simplify(num, den) {
        if (den === 0) return { num, den };
        const g = gcd(num, den);
        let n = num / g;
        let d = den / g;
        if (d < 0) { n = -n; d = -d; }
        return { num: n, den: d };
    }

    function randRange(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function makeFracHtml(n, d) {
        return `<span class="math-fraction"><span class="math-num">${n}</span><span class="math-den">${d}</span></span>`;
    }

    // LISTE DES GÉNÉRATEURS VARIÉS ISSUS DES EXERCICES DU FICHIER REF
    const generators = [
        // 1. Égalités complexes (Fiche A - Ex 1)
        function() {
            const n1 = randRange(11, 25); const d1 = randRange(12, 30);
            const k = randRange(2, 4);
            const n2 = n1 * k; const d2 = d1 * k;
            const useNeg = Math.random() > 0.5;
            const dispN1 = useNeg ? -n1 : n1; const dispN2 = useNeg ? -n2 : n2;
            return {
                type: "Égalité de fractions (Ex 1)",
                display: `<div class="math-line">Trouve la valeur manquante x : &nbsp; ${makeFracHtml(dispN1, d1)} = ${makeFracHtml('x', d2)}</div>`,
                answer: `${dispN2}`,
                check: (u) => parseInt(u.trim()) === dispN2
            };
        },
        // 2. Vraie Comparaison serrée de relatifs négatifs (Fiche A - Ex 2)
        function() {
            const d1 = randRange(11, 20); const d2 = d1 * 2;
            const n1 = randRange(11, 25);
            const n2 = n1 * 2 + 1; // force une différence subtile
            // On compare -n1/d1 et -n2/d2  => -n1*2/d2 vs -n2/d2
            const correctSign = (-n1 * 2 > -n2) ? ">" : "<";
            return {
                type: "Comparaison de négatifs (Ex 2)",
                display: `<div class="math-line">Complète avec &lt; ou &gt; : &nbsp; ${makeFracHtml('-' + n1, d1)} &nbsp; ... &nbsp; ${makeFracHtml('-' + n2, d2)}</div>`,
                answer: correctSign,
                check: (u) => u.trim() === correctSign
            };
        },
        // 3. Somme à dénominateurs multiples complexes (Fiche B - Ex 5)
        function() {
            const d1 = randRange(12, 18); const d2 = d1 * 2;
            const n1 = randRange(11, 29) * (Math.random() > 0.5 ? 1 : -1);
            const n2 = randRange(11, 29) * (Math.random() > 0.5 ? 1 : -1);
            // n1/d1 + n2/d2 = (n1*2 + n2)/d2
            const finalNum = (n1 * 2) + n2;
            const res = simplify(finalNum, d2);
            const ansStr = res.den === 1 ? `${res.num}` : `${res.num}/${res.den}`;
            return {
                type: "Somme / Différence (Ex 5)",
                display: `<div class="math-line">Calcule : &nbsp; ${makeFracHtml(n1, d1)} + ${makeFracHtml(n2, d2)}</div>`,
                answer: ansStr,
                check: (u) => u.replace(/\s+/g, '') === ansStr
            };
        },
        // 4. Soustraction croisée complexe (Fiche B - Ex 6)
        function() {
            const d1 = 12; const d2 = 16; // PPCM = 48
            const n1 = randRange(11, 19); const n2 = randRange(11, 19);
            const finalNum = (n1 * 4) - (n2 * 3);
            const res = simplify(finalNum, 48);
            const ansStr = res.den === 1 ? `${res.num}` : `${res.num}/${res.den}`;
            return {
                type: "Soustraction PPCM (Ex 6)",
                display: `<div class="math-line">Calcule : &nbsp; ${makeFracHtml(n1, d1)} − ${makeFracHtml(n2, d2)}</div>`,
                answer: ansStr,
                check: (u) => u.replace(/\s+/g, '') === ansStr
            };
        },
        // 5. Grand Produit de 3 fractions sans annulation totale (Fiche C - Ex 8)
        function() {
            const n1 = randRange(11, 15); const d1 = randRange(16, 20);
            const n2 = randRange(11, 15); const d2 = randRange(21, 25);
            const n3 = randRange(16, 20); const d3 = randRange(11, 15);
            const finalNum = n1 * n2 * n3; const finalDen = d1 * d2 * d3;
            const res = simplify(finalNum, finalDen);
            const ansStr = res.den === 1 ? `${res.num}` : `${res.num}/${res.den}`;
            return {
                type: "Produit de 3 fractions (Ex 8)",
                display: `<div class="math-line">Calcule : &nbsp; ${makeFracHtml(n1, d1)} × ${makeFracHtml(n2, d2)} × ${makeFracHtml(n3, d3)}</div>`,
                answer: ansStr,
                check: (u) => u.replace(/\s+/g, '') === ansStr
            };
        },
        // 6. Multiplications et Signes Relatifs accumulés (Fiche C - Ex 9)
        function() {
            const n1 = randRange(11, 20); const d1 = randRange(11, 20);
            const res = simplify(-n1 * 15, d1 * 14);
            const ansStr = res.den === 1 ? `${res.num}` : `${res.num}/${res.den}`;
            return {
                type: "Produit de relatifs (Ex 9)",
                display: `<div class="math-line">Calcule : &nbsp; ${makeFracHtml('-' + n1, d1)} × ${makeFracHtml(15, -14)}</div>`,
                answer: ansStr,
                check: (u) => u.replace(/\s+/g, '') === ansStr
            };
        },
        // 7. Division pure de relatifs (Fiche D - Ex 14 B)
        function() {
            const n1 = randRange(11, 22); const d1 = randRange(11, 22);
            const n2 = randRange(11, 22); const d2 = randRange(11, 22);
            // (n1/d1) / (-n2/d2) = (n1*d2) / -(d1*n2)
            const res = simplify(n1 * d2, d1 * -n2);
            const ansStr = res.den === 1 ? `${res.num}` : `${res.num}/${res.den}`;
            return {
                type: "Division de fractions (Ex 14)",
                display: `<div class="math-line">Calcule : &nbsp; ${makeFracHtml(n1, d1)} ÷ ${makeFracHtml('-' + n2, d2)}</div>`,
                answer: ansStr,
                check: (u) => u.replace(/\s+/g, '') === ansStr
            };
        },
        // 8. Enchaînements complexes avec Crochets alignés (Fiche D - Ex 14 L)
        function() {
            const base = randRange(11, 15);
            // [ 15/base - 11/base ] * 13/22 = (4/base) * 13/22 = 52 / (base*22)
            const res = simplify(4 * 13, base * 22);
            const ansStr = res.den === 1 ? `${res.num}` : `${res.num}/${res.den}`;
            return {
                type: "Priorités avec crochets (Ex 14)",
                display: `<div class="math-line"><span class="math-bracket">[</span> ${makeFracHtml(15, base)} − ${makeFracHtml(11, base)} <span class="math-bracket">]</span> × ${makeFracHtml(13, 22)}</div>`,
                answer: ansStr,
                check: (u) => u.replace(/\s+/g, '') === ansStr
            };
        },
        // 9. Fraction à étages réels (Fiche D - Ex 14 N)
        function() {
            // Étage haut : 15/12. Étage bas : 11/14
            // Résultat : (15/12) / (11/14) = (15*14)/(12*11) = 210 / 132
            const res = simplify(15 * 14, 12 * 11);
            const ansStr = `${res.num}/${res.den}`;
            const sup = makeFracHtml(15, 12); const inf = makeFracHtml(11, 14);
            const superFract = `<span class="math-fraction"><span class="math-num" style="border-bottom:3px double #fff; padding-bottom:4px;">${sup}</span><span class="math-den" style="padding-top:4px;">${inf}</span></span>`;
            return {
                type: "Fraction à étages (Ex 14)",
                display: `<div class="math-line">Calcule l'étage : &nbsp; ${superFract}</div>`,
                answer: ansStr,
                check: (u) => u.replace(/\s+/g, '') === ansStr
            };
        },
        // 10. Priorités directes sans parenthèses (Fiche D - Ex 14 K)
        function() {
            const n1 = randRange(11, 15); const d1 = randRange(11, 15);
            // n1/d1 * 12/13 - 15/13
            const multNum = n1 * 12; const multDen = d1 * 13;
            // Somme : multNum/multDen - (15*d1)/multDen
            const top = multNum - (15 * d1);
            const res = simplify(top, multDen);
            const ansStr = res.den === 1 ? `${res.num}` : `${res.num}/${res.den}`;
            return {
                type: "Priorités opératoires (Ex 14)",
                display: `<div class="math-line">${makeFracHtml(n1, d1)} × ${makeFracHtml(12, 13)} − ${makeFracHtml(15, 13)}</div>`,
                answer: ansStr,
                check: (u) => u.replace(/\s+/g, '') === ansStr
            };
        }
    ];

    function buildQuiz() {
        quizQuestions = [];
        // On récupère les 10 structures pour garantir 100% de diversité
        let rawList = [...generators];
        // On mélange aléatoirement les questions
        quizQuestions = rawList.sort(() => Math.random() - 0.5);
    }

    function startTest() {
        const nameInput = document.getElementById("student-name").value.trim();
        if (nameInput === "") { alert("Merci d'entrer ton nom et ton prénom !"); return; }
        studentName = nameInput;
        
        currentIndex = 0;
        score = 0;
        buildQuiz();
        
        document.getElementById("panel-login").style.display = "none";
        document.getElementById("panel-quiz").style.display = "block";
        
        loadQuestion();
    }

    function loadQuestion() {
        if (currentIndex >= 10) { endTest(); return; }
        const q = quizQuestions[currentIndex];
        
        document.getElementById("current-q").innerText = currentIndex + 1;
        document.getElementById("q-box").innerHTML = q.display;
        document.getElementById("user-answer").value = "";
        document.getElementById("user-answer").focus();
        
        if (q.type.includes("Comparaison")) {
            document.getElementById("q-consigne").innerText = "Compare les deux fractions ci-dessous :";
            document.getElementById("label-reponse").innerText = "Saisis le symbole adéquat (< ou >) :";
        } else {
            document.getElementById("q-consigne").innerText = "Calcule et donne le résultat sous forme simplifiée (Ex: 17/24 ou -19/12 ou 15) :";
            document.getElementById("label-reponse").innerText = "Ta réponse calculée :";
        }
        
        document.getElementById("progress-fill").style.width = (currentIndex / 10) * 100 + "%";
    }

    function submitAnswer() {
        const q = quizQuestions[currentIndex];
        let userAnswer = document.getElementById("user-answer").value.trim();
        if (!userAnswer) { alert("Tu dois écrire ta réponse !"); return; }
        
        q.savedAns = userAnswer;
        q.status = q.check(userAnswer) ? "correct" : "incorrect";
        if (q.status === "correct") score++;
        
        currentIndex++; 
        loadQuestion();
    }

    function skipQuestion() {
        const q = quizQuestions[currentIndex];
        q.status = "skipped"; q.savedAns = "Passé ⏭️";
        currentIndex++; loadQuestion();
    }

    function endTest() {
        document.getElementById("panel-quiz").style.display = "none";
        document.getElementById("panel-results").style.display = "block";
        
        document.getElementById("res-name").innerText = studentName;
        const displayGrade = document.getElementById("res-grade");
        displayGrade.innerText = `${score} / 10`;
        
        if(score >= 8) displayGrade.style.color = "var(--accent-color)";
        else if(score >= 5) displayGrade.style.color = "#ff9500";
        else displayGrade.style.color = "#ff453a";

        const tableBody = document.getElementById("bilan-table-body");
        tableBody.innerHTML = ""; 
        
        quizQuestions.forEach(q => {
            const row = document.createElement("tr");
            row.className = q.status === "correct" ? "row-correct" : (q.status === "skipped" ? "row-skipped" : "row-incorrect");
            
            const badgeCorrection = q.status === "correct" 
                ? `<span>Correct ✅</span>` 
                : `<div class="math-line" style="font-weight:bold; color:#ff453a;">${q.answer}</div>`;
                
            row.innerHTML = `<td><strong>${q.type}</strong></td><td>${q.display}</td><td><div class="math-line">${q.savedAns}</div></td><td>${badgeCorrection}</td>`;
            tableBody.appendChild(row);
        });
    }

    function restartTest() {
        document.getElementById("panel-results").style.display = "none";
        document.getElementById("panel-login").style.display = "block";
        document.getElementById("student-name").value = "";
    }

    document.getElementById("user-answer").addEventListener("keyup", (e) => { if (e.key === "Enter") submitAnswer(); });
</script>
</body>
</html>
