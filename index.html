<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatismes Fractions & Relatifs - 4ème</title>
    <style>
        :root {
            --bg-color: #0b0b0c;
            --card-bg: #16161a;
            --accent-color: #39ff14; /* Vert McKinsey */
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border-color: #2c2c2e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            max-width: 650px;
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 800;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .header .subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        .step-panel {
            display: none;
        }

        .step-panel.active {
            display: block;
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            background-color: #222227;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 15px;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .consigne {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: var(--text-main);
        }
        
        .question-box {
            background-color: #1e1e24;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Système de Fractions Verticales Imbriquées */
        .math-fraction {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            text-align: center;
            padding: 0 4px;
            line-height: 1;
        }
        .math-num {
            display: block;
            border-bottom: 2px solid var(--text-main);
            padding-bottom: 4px;
            margin-bottom: 2px;
        }
        .math-den {
            display: block;
            padding-top: 4px;
        }

        .math-line {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-button {
            background-color: #222227;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 16px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            text-align: left;
            transition: background-color 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
        }

        .option-button:hover {
            border-color: var(--accent-color);
            background-color: #2a2a30;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button.action-btn {
            flex: 1;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-start {
            background-color: var(--accent-color);
            color: #000000;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: #000000;
        }

        .btn-skip {
            background-color: #2c2c2e;
            color: #e5e5ea;
            border: 1px solid #48484a;
        }
        
        .progress-bar {
            background-color: #2c2c2e;
            border-radius: 4px;
            height: 6px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .indicator {
            text-align: right;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .result-box {
            background: #1e1e24;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            margin-top: 20px;
            text-align: center;
        }

        .score-display {
            font-size: 48px;
            font-weight: 800;
            color: var(--accent-color);
            margin: 15px 0;
        }
        
        table.bilan {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }

        table.bilan th, table.bilan td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .row-correct { color: var(--accent-color); }
        .row-incorrect { color: #ff453a; }
        .row-skipped { color: #e5e5ea; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Évaluation : Fractions et Relatifs</h1>
        <div class="subtitle">Niveau 4ème — Entraînement sans calculatrice</div>
    </div>

    <!-- PANEL 1 : LOGIN -->
    <div id="panel-login" class="step-panel active">
        <div class="form-group">
            <label for="student-name">Nom et Prénom :</label>
            <input type="text" id="student-name" placeholder="Ex: Lucas Bernard" autocomplete="off">
        </div>
        <button class="btn-start" onclick="startTest()">Démarrer l'entraînement</button>
    </div>

    <!-- PANEL 2 : PLAY -->
    <div id="panel-quiz" class="step-panel">
        <div class="indicator">Question <span id="current-q">1</span> / 5</div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        
        <div class="consigne" id="q-consigne">Calcule et donne le résultat sous forme simplifiée :</div>
        
        <div class="question-box" id="q-box"></div>
        
        <div id="input-area" style="background-color: #1e1e24; padding: 20px; border-radius: 8px; border: 1px solid var(--border-color);">
            <div id="standard-answer-input">
                <label for="user-answer">Réponse (Ex: 5/3 ou -2 ou 7) :</label>
                <input type="text" id="user-answer" placeholder="Inscris ta fraction ou ton entier" autocomplete="off">
            </div>
            
            <div class="btn-group">
                <button class="action-btn btn-skip" onclick="skipQuestion()">Passer ⏭️</button>
                <button class="action-btn btn-submit" id="btn-validate" onclick="submitAnswer()">Valider</button>
            </div>
        </div>
    </div>

    <!-- PANEL 3 : RECAP -->
    <div id="panel-results" class="step-panel">
        <div class="result-box">
            <h2>Résultats de la session</h2>
            <p>Élève : <span id="res-name" style="font-weight: bold; color: #fff;">...</span></p>
            <div class="score-display" id="res-grade">0 / 5</div>
        </div>

        <h3 style="margin-top:30px; color: var(--text-main); font-size:15px; text-transform:uppercase; border-bottom:1px solid var(--border-color); padding-bottom:8px;">Correction détaillée</h3>
        <table class="bilan">
            <thead>
                <tr>
                    <th>Compétence</th>
                    <th>Énoncé</th>
                    <th>Ta réponse</th>
                    <th>Correction</th>
                </tr>
            </thead>
            <tbody id="bilan-table-body"></tbody>
        </table>

        <button class="btn-start" style="margin-top: 30px;" onclick="location.reload()">Recommencer une série</button>
    </div>
</div>

<script>
    let quizQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let studentName = "";

    // Outils mathématiques de base
    function gcd(a, b) { return b === 0 ? Math.abs(a) : gcd(b, a % b); }
    
    function simplify(num, den) {
        if (den === 0) return { num, den };
        const g = gcd(num, den);
        let n = num / g;
        let d = den / g;
        if (d < 0) { n = -n; d = -d; }
        return { num: n, den: d };
    }

    function makeFracHtml(n, d) {
        if (d === 1) return `${n}`;
        return `<span class="math-fraction"><span class="math-num">${n}</span><span class="math-den">${d}</span></span>`;
    }

    // Générateurs basés sur tes Fiches d'exercices 4e
    const generators = [
        // 1. Égalités et Simplifications (Fiche A - Ex 1)
        function() {
            const base = simplify(Math.floor(Math.random() * 5) + 2, Math.floor(Math.random() * 6) + 3);
            const k = Math.floor(Math.random() * 3) + 2;
            const sign = Math.random() > 0.5 ? 1 : -1;
            const n1 = base.num * sign; const d1 = base.den;
            const n2 = n1 * k; const d2 = d1 * k;
            
            return {
                type: "Égalité de fractions",
                display: `<div class="math-line">Complète l'inconnue $ : <br> ${makeFracHtml(n1, d1)} = ${makeFracHtml('$', d2)}</div>`,
                answer: `${n2}`,
                check: (u) => parseInt(u) === n2
            };
        },

        // 2. Addition / Soustraction dénominateurs multiples (Fiche B - Ex 5)
        function() {
            const d1 = [3, 4, 5, 6][Math.floor(Math.random() * 4)];
            const k = [2, 3, 4][Math.floor(Math.random() * 3)];
            const d2 = d1 * k;
            const n1 = (Math.floor(Math.random() * 5) + 1) * (Math.random() > 0.5 ? 1 : -1);
            const n2 = (Math.floor(Math.random() * 5) + 1) * (Math.random() > 0.5 ? 1 : -1);
            
            const finalNum = n1 * k - n2;
            const res = simplify(finalNum, d2);
            const ansStr = res.den === 1 ? `${res.num}` : `${res.num}/${res.den}`;

            return {
                type: "Addition / Soustraction",
                display: `<div class="math-line">Calcule : ${makeFracHtml(n1, d1)} − ${makeFracHtml(n2, d2)}</div>`,
                answer: ansStr,
                check: (u) => {
                    const parts = u.replace(/\s+/g, '').split('/');
                    if(parts.length === 1) return res.den === 1 && parseInt(parts[0]) === res.num;
                    return parseInt(parts[0]) === res.num && parseInt(parts[1]) === res.den;
                }
            };
        },

        // 3. Produit de fractions avec relatifs (Fiche C - Ex 8)
        function() {
            const n1 = (Math.floor(Math.random() * 6) + 2) * (Math.random() > 0.5 ? 1 : -1);
            const d1 = Math.floor(Math.random() * 5) + 3;
            const n2 = (Math.floor(Math.random() * 6) + 2) * (Math.random() > 0.5 ? 1 : -1);
            const d2 = Math.floor(Math.random() * 5) + 2;

            const res = simplify(n1 * n2, d1 * d2);
            const ansStr = res.den === 1 ? `${res.num}` : `${res.num}/${res.den}`;

            return {
                type: "Multiplication de fractions",
                display: `<div class="math-line">Calcule : ${makeFracHtml(n1, d1)} × ${makeFracHtml(n2, d2)}</div>`,
                answer: ansStr,
                check: (u) => {
                    const parts = u.replace(/\s+/g, '').split('/');
                    if(parts.length === 1) return res.den === 1 && parseInt(parts[0]) === res.num;
                    return parseInt(parts[0]) === res.num && parseInt(parts[1]) === res.den;
                }
            };
        },

        // 4. Division de fractions (Fiche D - Ex 14)
        function() {
            const n1 = Math.floor(Math.random() * 4) + 2;
            const d1 = Math.floor(Math.random() * 3) + 3;
            const n2 = Math.floor(Math.random() * 5) + 2;
            const d2 = Math.floor(Math.random() * 3) + 5;

            // n1/d1 ÷ n2/d2 = (n1*d2) / (d1*n2)
            const res = simplify(n1 * d2, d1 * n2);
            const ansStr = res.den === 1 ? `${res.num}` : `${res.num}/${res.den}`;

            return {
                type: "Division de fractions",
                display: `<div class="math-line">Calcule : ${makeFracHtml(n1, d1)} ÷ ${makeFracHtml(n2, d2)}</div>`,
                answer: ansStr,
                check: (u) => {
                    const parts = u.replace(/\s+/g, '').split('/');
                    if(parts.length === 1) return res.den === 1 && parseInt(parts[0]) === res.num;
                    return parseInt(parts[0]) === res.num && parseInt(parts[1]) === res.den;
                }
            };
        },

        // 5. Vocabulaire Relatifs & Fractions (Fiche D - Ex 13)
        function() {
            const val = [3, 4, 5, 7][Math.floor(Math.random() * 4)];
            // L'opposé de l'inverse de l'opposé de X -> - ( 1 / (-X) ) = 1/X
            const res = simplify(1, val);

            return {
                type: "Vocabulaire Inverse/Opposé",
                display: `Quel est <b>l'opposé de l'inverse de l'opposé de ${val}</b> ?`,
                answer: `1/${val}`,
                check: (u) => u.replace(/\s+/g, '') === `1/${val}`
            };
        },

        // 6. Enchaînement d'opérations prioritaires (Fiche D - Ex 14 K, L)
        function() {
            // 1/2 - 3/4 * 4/5 = 1/2 - 3/5 = -1/10
            const n1 = 1; const d1 = 2;
            const n2 = 3; const d2 = 4;
            const n3 = 4; const d3 = 5;

            const res = simplify(1 * 5 - 3 * 2, 10); // -1/10
            const ansStr = `${res.num}/${res.den}`;

            return {
                type: "Priorités opératoires",
                display: `<div class="math-line">Calcule en respectant les priorités : <br> ${makeFracHtml(n1, d1)} − ${makeFracHtml(n2, d2)} × ${makeFracHtml(n3, d3)}</div>`,
                answer: ansStr,
                check: (u) => u.replace(/\s+/g, '') === ansStr
            };
        },

        // 7. Fraction de fractions complexe (Fiche D - Ex 14 N, P)
        function() {
            // Étage haut : 5/3. Étage bas : 1/2 - 1/4 = 1/4
            // Résultat : (5/3) / (1/4) = 20/3
            const upperHtml = makeFracHtml(5, 3);
            const lowerHtml = `<div class="math-line">${makeFracHtml(1, 2)} − ${makeFracHtml(1, 4)}</div>`;
            const fullFrac = `<span class="math-fraction"><span class="math-num">${upperHtml}</span><span class="math-den">${lowerHtml}</span></span>`;

            return {
                type: "Fraction à étages complexes",
                display: `<div class="math-line">Simplifie le calcul suivant : <br> ${fullFrac}</div>`,
                answer: "20/3",
                check: (u) => u.replace(/\s+/g, '') === "20/3"
            };
        }
    ];

    function buildQuiz() {
        quizQuestions = [];
        const shuffled = [...generators].sort(() => 0.5 - Math.random());
        for (let i = 0; i < 5; i++) quizQuestions.push(shuffled[i]());
    }

    function startTest() {
        const nameInput = document.getElementById("student-name").value.trim();
        if (nameInput === "") { alert("Inscris ton nom pour commencer !"); return; }
        studentName = nameInput;
        buildQuiz();
        showPanel("panel-quiz");
        loadQuestion();
    }

    function showPanel(panelId) {
        document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(panelId).classList.add('active');
    }

    function loadQuestion() {
        if (currentIndex >= 5) { endTest(); return; }
        const q = quizQuestions[currentIndex];
        document.getElementById("current-q").innerText = currentIndex + 1;
        document.getElementById("q-box").innerHTML = q.display;
        document.getElementById("user-answer").value = "";
        document.getElementById("user-answer").focus();
        document.getElementById("progress-fill").style.width = (currentIndex / 5) * 100 + "%";
    }

    function submitAnswer() {
        const q = quizQuestions[currentIndex];
        let userAnswer = document.getElementById("user-answer").value.trim();
        if (!userAnswer) { alert("Tu dois inscrire une réponse !"); return; }
        q.savedAns = userAnswer;
        q.status = q.check(userAnswer) ? "correct" : "incorrect";
        if (q.status === "correct") score++;
        currentIndex++; loadQuestion();
    }

    function skipQuestion() {
        const q = quizQuestions[currentIndex];
        q.status = "skipped"; q.savedAns = "Passé ⏭️";
        currentIndex++; loadQuestion();
    }

    function endTest() {
        showPanel("panel-results");
        document.getElementById("res-name").innerText = studentName;
        const displayGrade = document.getElementById("res-grade");
        displayGrade.innerText = `${score} / 5`;
        displayGrade.style.color = score >= 4 ? "var(--accent-color)" : (score >= 2.5 ? "#ff9500" : "#ff453a");

        const tableBody = document.getElementById("bilan-table-body");
        tableBody.innerHTML = ""; 
        quizQuestions.forEach(q => {
            const row = document.createElement("tr");
            row.className = q.status === "correct" ? "row-correct" : (q.status === "skipped" ? "row-skipped" : "row-incorrect");
            const badge = q.status === "correct" ? `<span>Correct ✅</span>` : `<div class="math-line" style="font-weight:bold;">${q.answer}</div>`;
            row.innerHTML = `<td><strong>${q.type}</strong></td><td>${q.display}</td><td><div class="math-line">${q.savedAns}</div></td><td>${badge}</td>`;
            tableBody.appendChild(row);
        });
    }

    document.getElementById("user-answer").addEventListener("keyup", (e) => { if (e.key === "Enter") submitAnswer(); });
</script>
</body>
</html>
