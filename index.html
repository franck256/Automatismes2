<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Évaluation Fractions & Relatifs - 4ème</title>
    <style>
        :root {
            --bg-color: #0b0b0c;
            --card-bg: #16161a;
            --accent-color: #39ff14;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border-color: #2c2c2e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            max-width: 750px;
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 800;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .header .subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            background-color: #222227;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 15px;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .consigne {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: var(--text-main);
        }
        
        .question-box {
            background-color: #1e1e24;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        /* ALIGNEMENT FLEXBOX ALIGNÉ SUR LA LIGNE DE TEXTE */
        .math-line {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
            vertical-align: middle;
        }

        .math-fraction {
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 6px;
            vertical-align: middle;
        }
        
        .math-num {
            display: block;
            border-bottom: 2px solid var(--text-main);
            padding-bottom: 2px;
            text-align: center;
        }
        
        .math-den {
            display: block;
            padding-top: 2px;
            text-align: center;
        }

        .math-bracket {
            font-size: 42px;
            font-weight: 300;
            line-height: 1;
            display: inline-block;
            vertical-align: middle;
            color: #ffffff;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button.action-btn {
            flex: 1;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-start {
            background-color: var(--accent-color);
            color: #000000;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: #000000;
        }

        .btn-skip {
            background-color: #2c2c2e;
            color: #e5e5ea;
            border: 1px solid #48484a;
        }
        
        .progress-bar {
            background-color: #2c2c2e;
            border-radius: 4px;
            height: 6px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .indicator {
            text-align: right;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .result-box {
            background: #1e1e24;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            margin-top: 20px;
            text-align: center;
        }

        .score-display {
            font-size: 48px;
            font-weight: 800;
            color: var(--accent-color);
            margin: 15px 0;
        }
        
        table.bilan {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }

        table.bilan th, table.bilan td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .row-correct { color: var(--accent-color); }
        .row-incorrect { color: #ff453a; }
        .row-skipped { color: #e5e5ea; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Fractions & Nombres Relatifs</h1>
        <div class="subtitle">Série complète de 10 exercices basés sur le fichier de référence</div>
    </div>

    <!-- PANEL 1 : CONNEXION -->
    <div id="panel-login" class="step-panel" style="display: block;">
        <div style="margin-bottom: 20px;">
            <label for="student-name">Nom et Prénom de l'élève :</label>
            <input type="text" id="student-name" placeholder="Ex: Lucas Bernard" autocomplete="off">
        </div>
        <button class="btn-start" onclick="startTest()">Démarrer l'évaluation</button>
    </div>

    <!-- PANEL 2 : EXERCICES -->
    <div id="panel-quiz" class="step-panel" style="display: none;">
        <div class="indicator">Question <span id="current-q">1</span> / 10</div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        
        <div class="consigne" id="q-consigne">Calcule l'expression suivante :</div>
        
        <div class="question-box" id="q-box"></div>
        
        <div style="background-color: #1e1e24; padding: 20px; border-radius: 8px; border: 1px solid var(--border-color);">
            <div>
                <label for="user-answer" id="label-reponse">Ta réponse :</label>
                <input type="text" id="user-answer" placeholder="Ex: 13/15 ou -5/4" autocomplete="off">
            </div>
            
            <div class="btn-group">
                <button class="action-btn btn-skip" onclick="skipQuestion()">Passer ⏭️</button>
                <button class="action-btn btn-submit" id="btn-validate" onclick="submitAnswer()">Valider la réponse</button>
            </div>
        </div>
    </div>

    <!-- PANEL 3 : RAPPORTS -->
    <div id="panel-results" class="step-panel" style="display: none;">
        <div class="result-box">
            <h2>Fin de l'évaluation</h2>
            <p>Élève : <span id="res-name" style="font-weight: bold; color: #fff;">...</span></p>
            <div class="score-display" id="res-grade">0 / 10</div>
        </div>

        <h3 style="margin-top:30px; color: var(--text-main); font-size:15px; text-transform:uppercase; border-bottom:1px solid var(--border-color); padding-bottom:8px;">Bilan détaillé</h3>
        <table class="bilan">
            <thead>
                <tr>
                    <th>Type de compétence</th>
                    <th>Énoncé</th>
                    <th>Ta réponse</th>
                    <th>Correction</th>
                </tr>
            </thead>
            <tbody id="bilan-table-body"></tbody>
        </table>

        <button class="btn-start" style="margin-top: 30px;" onclick="window.location.reload()">Générer une nouvelle série</button>
    </div>
</div>

<script>
    let quizQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let studentName = "";

    function gcd(a, b) { return b === 0 ? Math.abs(a) : gcd(b, a % b); }
    
    function simplify(num, den) {
        if (den === 0) return { num, den };
        const g = gcd(num, den);
        let n = num / g;
        let d = den / g;
        if (d < 0) { n = -n; d = -d; }
        return { num: n, den: d };
    }

    function randRange(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function makeFracHtml(n, d) {
        return `<span class="math-fraction"><span class="math-num">${n}</span><span class="math-den">${d}</span></span>`;
    }

    // Génération directe et à plat des 10 questions sans interférence de pointeurs de fonction
    function buildQuizData() {
        quizQuestions = [];

        // Q1 : Égalité complexe (Fiche A)
        let n1_1 = randRange(11, 22), d1_1 = randRange(12, 25), k1 = randRange(2, 3);
        quizQuestions.push({
            type: "Égalité de fractions (Ex 1)",
            display: `<div class="math-line">Trouve le nombre x : &nbsp; ${makeFracHtml(n1_1, d1_1)} = ${makeFracHtml('x', d1_1 * k1)}</div>`,
            answer: `${n1_1 * k1}`,
            check: (u) => parseInt(u.trim()) === (n1_1 * k1)
        });

        // Q2 : Comparaison de relatifs négatifs (Fiche A)
        let d2_1 = randRange(11, 19), n2_1 = randRange(12, 24);
        let correctSign = (-n2_1 * 2 > -(n2_1 * 2 + 1)) ? ">" : "<";
        quizQuestions.push({
            type: "Comparaison de négatifs (Ex 2)",
            display: `<div class="math-line">Complète par &lt; ou &gt; : &nbsp; ${makeFracHtml('-' + n2_1, d2_1)} &nbsp; ... &nbsp; ${makeFracHtml('-' + (n2_1 * 2 + 1), d2_1 * 2)}</div>`,
            answer: correctSign,
            check: (u) => u.trim() === correctSign
        });

        // Q3 : Addition dénominateur multiple (Fiche B)
        let d3_1 = randRange(12, 16), n3_1 = randRange(11, 25), n3_2 = randRange(11, 25);
        let sim3 = simplify((n3_1 * 2) + n3_2, d3_1 * 2);
        let ans3 = sim3.den === 1 ? `${sim3.num}` : `${sim3.num}/${sim3.den}`;
        quizQuestions.push({
            type: "Somme de fractions (Ex 5)",
            display: `<div class="math-line">Calcule : &nbsp; ${makeFracHtml(n3_1, d3_1)} + ${makeFracHtml(n3_2, d3_1 * 2)}</div>`,
            answer: ans3,
            check: (u) => u.replace(/\s+/g, '') === ans3
        });

        // Q4 : Soustraction complexe PPCM (Fiche B)
        let n4_1 = randRange(11, 18), n4_2 = randRange(11, 18);
        let sim4 = simplify((n4_1 * 4) - (n4_2 * 3), 48);
        let ans4 = sim4.den === 1 ? `${sim4.num}` : `${sim4.num}/${sim4.den}`;
        quizQuestions.push({
            type: "Soustraction PPCM (Ex 6)",
            display: `<div class="math-line">Calcule : &nbsp; ${makeFracHtml(n4_1, 12)} − ${makeFracHtml(n4_2, 16)}</div>`,
            answer: ans4,
            check: (u) => u.replace(/\s+/g, '') === ans4
        });

        // Q5 : Produit lourd de 3 fractions (Fiche C)
        let n5_1 = randRange(11, 14), d5_1 = randRange(15, 18), n5_2 = randRange(11, 14), d5_2 = randRange(19, 22);
        let sim5 = simplify(n5_1 * n5_2 * 17, d5_1 * d5_2 * 11);
        let ans5 = sim5.den === 1 ? `${sim5.num}` : `${sim5.num}/${sim5.den}`;
        quizQuestions.push({
            type: "Produit de 3 fractions (Ex 8)",
            display: `<div class="math-line">Calcule : &nbsp; ${makeFracHtml(n5_1, d5_1)} × ${makeFracHtml(n5_2, d5_2)} × ${makeFracHtml(17, 11)}</div>`,
            answer: ans5,
            check: (u) => u.replace(/\s+/g, '') === ans5
        });

        // Q6 : Produit avec signes négatifs (Fiche C)
        let n6_1 = randRange(11, 19), d6_1 = randRange(11, 19);
        let sim6 = simplify(-n6_1 * 15, d6_1 * 14);
        let ans6 = sim6.den === 1 ? `${sim6.num}` : `${sim6.num}/${sim6.den}`;
        quizQuestions.push({
            type: "Produit de relatifs (Ex 9)",
            display: `<div class="math-line">Calcule : &nbsp; ${makeFracHtml('-' + n6_1, d6_1)} × ${makeFracHtml(15, -14)}</div>`,
            answer: ans6,
            check: (u) => u.replace(/\s+/g, '') === ans6
        });

        // Q7 : Division pure complexe (Fiche D)
        let n7_1 = randRange(11, 20), d7_1 = randRange(11, 20), n7_2 = randRange(11, 20), d7_2 = randRange(11, 20);
        let sim7 = simplify(n7_1 * d7_2, d7_1 * -n7_2);
        let ans7 = sim7.den === 1 ? `${sim7.num}` : `${sim7.num}/${sim7.den}`;
        quizQuestions.push({
            type: "Division de fractions (Ex 14)",
            display: `<div class="math-line">Calcule : &nbsp; ${makeFracHtml(n7_1, d7_1)} ÷ ${makeFracHtml('-' + n7_2, d7_2)}</div>`,
            answer: ans7,
            check: (u) => u.replace(/\s+/g, '') === ans7
        });

        // Q8 : Enchaînement et priorités avec crochets (Fiche D)
        let base8 = randRange(11, 15);
        let sim8 = simplify(4 * 13, base8 * 22);
        let ans8 = sim8.den === 1 ? `${sim8.num}` : `${sim8.num}/${sim8.den}`;
        quizQuestions.push({
            type: "Priorités avec crochets (Ex 14)",
            display: `<div class="math-line"><span class="math-bracket">[</span> ${makeFracHtml(15, base8)} − ${makeFracHtml(11, base8)} <span class="math-bracket">]</span> × ${makeFracHtml(13, 22)}</div>`,
            answer: ans8,
            check: (u) => u.replace(/\s+/g, '') === ans8
        });

        // Q9 : Super fraction à étages complexes (Fiche D)
        let sim9 = simplify(15 * 14, 12 * 11);
        let ans9 = `${sim9.num}/${sim9.den}`;
        let sup = makeFracHtml(15, 12), inf = makeFracHtml(11, 14);
        let superFract = `<span class="math-fraction"><span class="math-num" style="border-bottom:3px double #fff; padding-bottom:4px;">${sup}</span><span class="math-den" style="padding-top:4px;">${inf}</span></span>`;
        quizQuestions.push({
            type: "Fraction à étages (Ex 14)",
            display: `<div class="math-line">Résous l'étage : &nbsp; ${superFract}</div>`,
            answer: ans9,
            check: (u) => u.replace(/\s+/g, '') === ans9
        });

        // Q10 : Priorité opératoire sans parenthèses (Fiche D)
        let n10_1 = randRange(11, 15), d10_1 = randRange(11, 15);
        let sim10 = simplify((n10_1 * 12) - (15 * d10_1), d10_1 * 13);
        let ans10 = sim10.den === 1 ? `${sim10.num}` : `${sim10.num}/${sim10.den}`;
        quizQuestions.push({
            type: "Priorités opératoires (Ex 14)",
            display: `<div class="math-line">${makeFracHtml(n10_1, d10_1)} × ${makeFracHtml(12, 13)} − ${makeFracHtml(15, 13)}</div>`,
            answer: ans10,
            check: (u) => u.replace(/\s+/g, '') === ans10
        });

        // Mélange final garanti sain
        quizQuestions.sort(() => Math.random() - 0.5);
    }

    function startTest() {
        const nameInput = document.getElementById("student-name").value.trim();
        if (nameInput === "") { alert("Veuillez renseigner votre Nom et Prénom."); return; }
        studentName = nameInput;
        
        currentIndex = 0;
        score = 0;
        buildQuizData();
        
        document.getElementById("panel-login").style.display = "none";
        document.getElementById("panel-quiz").style.display = "block";
        
        loadQuestion();
    }

    function loadQuestion() {
        if (currentIndex >= 10) { endTest(); return; }
        const q = quizQuestions[currentIndex];
        
        document.getElementById("current-q").innerText = currentIndex + 1;
        document.getElementById("q-box").innerHTML = q.display;
        document.getElementById("user-answer").value = "";
        document.getElementById("user-answer").focus();
        
        if (q.type.includes("Comparaison")) {
            document.getElementById("q-consigne").innerText = "Compare les deux expressions :";
            document.getElementById("label-reponse").innerText = "Inscris uniquement le signe < ou > :";
        } else {
            document.getElementById("q-consigne").innerText = "Calcule et tape le résultat sous sa forme la plus simple possible :";
            document.getElementById("label-reponse").innerText = "Ta réponse (Format attendu : 14/15 ou -9/4 ou un entier) :";
        }
        
        document.getElementById("progress-fill").style.width = (currentIndex / 10) * 100 + "%";
    }

    function submitAnswer() {
        const q = quizQuestions[currentIndex];
        let userAnswer = document.getElementById("user-answer").value.trim();
        if (!userAnswer) { alert("Tu dois formuler une réponse avant de valider !"); return; }
        
        q.savedAns = userAnswer;
        q.status = q.check(userAnswer) ? "correct" : "incorrect";
        if (q.status === "correct") score++;
        
        currentIndex++; 
        loadQuestion();
    }

    function skipQuestion() {
        const q = quizQuestions[currentIndex];
        q.status = "skipped"; q.savedAns = "Passé ⏭️";
        currentIndex++; loadQuestion();
    }

    function endTest() {
        document.getElementById("panel-quiz").style.display = "none";
        document.getElementById("panel-results").style.display = "block";
        
        document.getElementById("res-name").innerText = studentName;
        const displayGrade = document.getElementById("res-grade");
        displayGrade.innerText = `${score} / 10`;
        
        if(score >= 8) displayGrade.style.color = "var(--accent-color)";
        else if(score >= 5) displayGrade.style.color = "#ff9500";
        else displayGrade.style.color = "#ff453a";

        const tableBody = document.getElementById("bilan-table-body");
        tableBody.innerHTML = ""; 
        
        quizQuestions.forEach(q => {
            const row = document.createElement("tr");
            row.className = q.status === "correct" ? "row-correct" : (q.status === "skipped" ? "row-skipped" : "row-incorrect");
            
            const badgeCorrection = q.status === "correct" 
                ? `<span>Correct ✅</span>` 
                : `<div class="math-line" style="font-weight:bold; color:#ff453a;">${q.answer}</div>`;
                
            row.innerHTML = `<td><strong>${q.type}</strong></td><td>${q.display}</td><td><div class="math-line">${q.savedAns}</div></td><td>${badgeCorrection}</td>`;
            tableBody.appendChild(row);
        });
    }

    document.getElementById("user-answer").addEventListener("keyup", (e) => { if (e.key === "Enter") submitAnswer(); });
</script>
</body>
</html>
