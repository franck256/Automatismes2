<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entraînement : Fractions et Relatifs</title>
    <style>
        :root {
            --bg-color: #0b0b0c;
            --card-bg: #16161a;
            --accent-color: #39ff14;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border-color: #2c2c2e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            max-width: 700px;
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 800;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .header .subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            background-color: #222227;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 15px;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .consigne {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: var(--text-main);
        }
        
        .question-box {
            background-color: #1e1e24;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            line-height: 2;
        }

        /* Rendu Mathématique Corrigé et Alignement des Fractions */
        .math-line {
            display: inline-block;
            vertical-align: middle;
            line-height: 2.2;
            white-space: nowrap;
        }

        .math-fraction {
            display: inline-block;
            vertical-align: middle;
            text-align: center;
            padding: 0 6px;
            line-height: 1.1;
        }
        
        .math-num {
            display: block;
            border-bottom: 2px solid var(--text-main);
            padding-bottom: 3px;
            margin-bottom: 3px;
        }
        
        .math-den {
            display: block;
            padding-top: 3px;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button.action-btn {
            flex: 1;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-start {
            background-color: var(--accent-color);
            color: #000000;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: #000000;
        }

        .btn-skip {
            background-color: #2c2c2e;
            color: #e5e5ea;
            border: 1px solid #48484a;
        }
        
        .progress-bar {
            background-color: #2c2c2e;
            border-radius: 4px;
            height: 6px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .indicator {
            text-align: right;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .result-box {
            background: #1e1e24;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            margin-top: 20px;
            text-align: center;
        }

        .score-display {
            font-size: 48px;
            font-weight: 800;
            color: var(--accent-color);
            margin: 15px 0;
        }
        
        table.bilan {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }

        table.bilan th, table.bilan td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .row-correct { color: var(--accent-color); }
        .row-incorrect { color: #ff453a; }
        .row-skipped { color: #e5e5ea; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Fractions & Nombres Relatifs</h1>
        <div class="subtitle">Évaluation Aléatoire — Série complète de 10 questions</div>
    </div>

    <!-- PANEL 1 : LOGIN -->
    <div id="panel-login" class="step-panel" style="display: block;">
        <div style="margin-bottom: 20px;">
            <label for="student-name">Nom et Prénom de l'élève :</label>
            <input type="text" id="student-name" placeholder="Ex: Lucas Bernard" autocomplete="off">
        </div>
        <button class="btn-start" onclick="startTest()">Démarrer l'évaluation</button>
    </div>

    <!-- PANEL 2 : QUIZ -->
    <div id="panel-quiz" class="step-panel" style="display: none;">
        <div class="indicator">Question <span id="current-q">1</span> / 10</div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        
        <div class="consigne" id="q-consigne">Calcule et écris le résultat sous forme simplifiée :</div>
        
        <div class="question-box" id="q-box"></div>
        
        <div style="background-color: #1e1e24; padding: 20px; border-radius: 8px; border: 1px solid var(--border-color);">
            <div>
                <label for="user-answer" id="label-reponse">Ta réponse :</label>
                <input type="text" id="user-answer" placeholder="Saisis ton résultat ici" autocomplete="off">
            </div>
            
            <div class="btn-group">
                <button class="action-btn btn-skip" onclick="skipQuestion()">Passer ⏭️</button>
                <button class="action-btn btn-submit" id="btn-validate" onclick="submitAnswer()">Valider la réponse</button>
            </div>
        </div>
    </div>

    <!-- PANEL 3 : RESULTATS -->
    <div id="panel-results" class="step-panel" style="display: none;">
        <div class="result-box">
            <h2>Fin de l'évaluation</h2>
            <p>Élève : <span id="res-name" style="font-weight: bold; color: #fff;">...</span></p>
            <div class="score-display" id="res-grade">0 / 10</div>
        </div>

        <h3 style="margin-top:30px; color: var(--text-main); font-size:15px; text-transform:uppercase; border-bottom:1px solid var(--border-color); padding-bottom:8px;">Bilan des compétences</h3>
        <table class="bilan">
            <thead>
                <tr>
                    <th>Compétence</th>
                    <th>Énoncé</th>
                    <th>Ta réponse</th>
                    <th>Correction</th>
                </tr>
            </thead>
            <tbody id="bilan-table-body"></tbody>
        </table>

        <button class="btn-start" style="margin-top: 30px;" onclick="location.reload()">Générer une nouvelle série</button>
    </div>
</div>

<script>
    let quizQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let studentName = "";

    function gcd(a, b) { return b === 0 ? Math.abs(a) : gcd(b, a % b); }
    
    function simplify(num, den) {
        if (den === 0) return { num, den };
        const g = gcd(num, den);
        let n = num / g;
        let d = den / g;
        if (d < 0) { n = -n; d = -d; }
        return { num: n, den: d };
    }

    function rand2D() {
        return Math.floor(Math.random() * 25) + 11; // Nombres entre 11 et 35
    }

    function makeFracHtml(n, d) {
        if (parseInt(d) === 1) return `${n}`;
        return `<span class="math-fraction"><span class="math-num">${n}</span><span class="math-den">${d}</span></span>`;
    }

    // Générateurs couvrant toute la variété du fichier de référence
    const generators = [
        // 1. Comparaison de fractions négatives complexes (Fiche A - Ex 2)
        function() {
            const d1 = rand2D(); const d2 = d1 * 2;
            const n1 = rand2D(); const n2 = n1 * 2 + (Math.random() > 0.5 ? 1 : -1); 
            const val1 = -n1 / d1; const val2 = -n2 / d2;
            const correctSign = val1 > val2 ? ">" : "<";
            return {
                type: "Comparaison de relatifs (Ex 2)",
                display: `<div class="math-line">Compare ces nombres (écris &lt; ou &gt;) : <br> ${makeFracHtml('-' + n1, d1)} &nbsp; ... &nbsp; ${makeFracHtml('-' + n2, d2)}</div>`,
                answer: correctSign,
                check: (u) => u.trim() === correctSign
            };
        },
        // 2. Addition/Soustraction (Fiche B - Ex 5)
        function() {
            const d1 = rand2D(); const d2 = d1 * 2;
            const n1 = rand2D() * -1; const n2 = rand2D();
            const finalNum = (n1 * 2) - n2;
            const res = simplify(finalNum, d2);
            const ansStr = res.den === 1 ? `${res.num}` : `${res.num}/${res.den}`;
            return {
                type: "Addition/Soustraction (Ex 5)",
                display: `<div class="math-line">Calcule : ${makeFracHtml(n1, d1)} − ${makeFracHtml(n2, d2)}</div>`,
                answer: ansStr,
                check: (u) => {
                    const p = u.replace(/\s+/g, '').split('/');
                    if(p.length === 1) return res.den === 1 && parseInt(p[0]) === res.num;
                    return parseInt(p[0]) === res.num && parseInt(p[1]) === res.den;
                }
            };
        },
        // 3. Produit croisé en chaîne (Fiche C - Ex 8-Z)
        function() {
            const a = rand2D(); const b = rand2D(); const c = rand2D();
            return {
                type: "Produit en chaîne (Ex 8-Z)",
                display: `<div class="math-line">Calcule le produit : <br> ${makeFracHtml(a, '-' + b)} × ${makeFracHtml(b, '-' + c)} × ${makeFracHtml('-' + c, a)}</div>`,
                answer: "-1",
                check: (u) => u.replace(/\s+/g, '') === "-1"
            };
        },
        // 4. Division complexe (Fiche D - Ex 14)
        function() {
            const n1 = rand2D(); const d1 = rand2D();
            const res = simplify(n1 * n1, d1 * -d1);
            const ansStr = res.den === 1 ? `${res.num}` : `${res.num}/${res.den}`;
            return {
                type: "Division complexe (Ex 14)",
                display: `<div class="math-line">Calcule : <br> ${makeFracHtml('-' + n1, '-' + d1)} ÷ ${makeFracHtml('-' + d1, n1)}</div>`,
                answer: ansStr,
                check: (u) => {
                    const p = u.replace(/\s+/g, '').split('/');
                    if(p.length === 1) return res.den === 1 && parseInt(p[0]) === res.num;
                    return parseInt(p[0]) === res.num && parseInt(p[1]) === res.den;
                }
            };
        },
        // 5. Priorités & Parenthèses avec crochets alignés (Fiche D - Ex 14-L)
        function() {
            const base = rand2D();
            return {
                type: "Priorités & Parenthèses (Ex 14-L)",
                display: `<div class="math-line">Calcule : <br> 2 × [ ${makeFracHtml(1, base)} − ${makeFracHtml(3, base * 2)} ] × ${base}</div>`,
                answer: "-1",
                check: (u) => u.replace(/\s+/g, '') === "-1"
            };
        },
        // 6. Simplification d'égalités (Fiche A - Ex 1)
        function() {
            const n1 = rand2D(); const d1 = rand2D();
            const n2 = n1 * 2; const d2 = d1 * 2;
            return {
                type: "Égalité de fractions (Ex 1)",
                display: `<div class="math-line">Trouve la valeur de $ : <br> ${makeFracHtml(n1, d1)} = ${makeFracHtml('$', d2)}</div>`,
                answer: `${n2}`,
                check: (u) => parseInt(u.trim()) === n2
            };
        },
        // 7. Multiplications de base (Fiche C - Ex 8)
        function() {
            const n1 = 11; const d1 = 13;
            const n2 = 13; const d2 = 11;
            return {
                type: "Multiplication simple (Ex 8)",
                display: `<div class="math-line">Calcule l'écriture simplifiée : <br> ${makeFracHtml('-' + n1, d1)} × ${makeFracHtml(n2, d2)}</div>`,
                answer: "-1",
                check: (u) => u.replace(/\s+/g, '') === "-1"
            };
        },
        // 8. Vocabulaire Inverse/Opposé (Fiche D - Ex 13)
        function() {
            const val = rand2D();
            return {
                type: "Vocabulaire Inverse/Opposé (Ex 13)",
                display: `<div class="math-line">Quel est l'opposé de l'inverse de l'opposé de ${val} ?</div>`,
                answer: `1/${val}`,
                check: (u) => u.replace(/\s+/g, '') === `1/${val}`
            };
        },
        // 9. Fraction à étages équivalents (Fiche D - Ex 14-I)
        function() {
            const a = rand2D();
            const sup = makeFracHtml(a, 13);
            const inf = `<div class="math-line">${makeFracHtml(a + 2, 13)} − ${makeFracHtml(2, 13)}</div>`;
            const superFract = `<span class="math-fraction"><span class="math-num">${sup}</span><span class="math-den">${inf}</span></span>`;
            return {
                type: "Fraction multiniveaux (Ex 14-I)",
                display: `<div class="math-line">Simplifie l'expression : <br> ${superFract}</div>`,
                answer: "1",
                check: (u) => u.replace(/\s+/g, '') === "1"
            };
        },
        // 10. Priorités opératoires sans parenthèses (Fiche D - Ex 14-K)
        function() {
            const base = rand2D();
            const n1 = base; const d1 = 12;
            const n2 = 12; const d2 = base;
            return {
                type: "Priorités sans parenthèse (Ex 14-K)",
                display: `<div class="math-line">Calcule en respectant les priorités : <br> ${makeFracHtml(n1, d1)} × ${makeFracHtml(n2, d2)} − 2</div>`,
                answer: "-1",
                check: (u) => u.replace(/\s+/g, '') === "-1"
            };
        }
    ];

    function buildQuiz() {
        // Mélange et sélectionne l'intégralité des 10 générateurs pour un maximum de diversité
        quizQuestions = [...generators].sort(() => 0.5 - Math.random());
    }

    function startTest() {
        const nameInput = document.getElementById("student-name").value.trim();
        if (nameInput === "") { alert("Merci d'entrer ton nom et ton prénom !"); return; }
        studentName = nameInput;
        buildQuiz();
        
        document.getElementById("panel-login").style.display = "none";
        document.getElementById("panel-quiz").style.display = "block";
        
        loadQuestion();
    }

    function loadQuestion() {
        if (currentIndex >= 10) { endTest(); return; }
        const q = quizQuestions[currentIndex];
        
        document.getElementById("current-q").innerText = currentIndex + 1;
        document.getElementById("q-box").innerHTML = q.display;
        document.getElementById("user-answer").value = "";
        document.getElementById("user-answer").focus();
        
        if (q.type.includes("Comparaison")) {
            document.getElementById("q-consigne").innerText = "Compare les deux expressions ci-dessous :";
            document.getElementById("label-reponse").innerText = "Tape uniquement < ou > :";
        } else {
            document.getElementById("q-consigne").innerText = "Calcule et donne le résultat sous sa forme la plus simple :";
            document.getElementById("label-reponse").innerText = "Ta réponse (Ex: 11/14 ou -12) :";
        }
        
        document.getElementById("progress-fill").style.width = (currentIndex / 10) * 100 + "%";
    }

    function submitAnswer() {
        const q = quizQuestions[currentIndex];
        let userAnswer = document.getElementById("user-answer").value.trim();
        if (!userAnswer) { alert("Tu devez saisir une réponse !"); return; }
        
        q.savedAns = userAnswer;
        q.status = q.check(userAnswer) ? "correct" : "incorrect";
        if (q.status === "correct") score++;
        
        currentIndex++; 
        loadQuestion();
    }

    function skipQuestion() {
        const q = quizQuestions[currentIndex];
        q.status = "skipped"; q.savedAns = "Passé ⏭️";
        currentIndex++; loadQuestion();
    }

    function endTest() {
        document.getElementById("panel-quiz").style.display = "none";
        document.getElementById("panel-results").style.display = "block";
        
        document.getElementById("res-name").innerText = studentName;
        const displayGrade = document.getElementById("res-grade");
        displayGrade.innerText = `${score} / 10`;
        
        if(score >= 8) displayGrade.style.color = "var(--accent-color)";
        else if(score >= 5) displayGrade.style.color = "#ff9500";
        else displayGrade.style.color = "#ff453a";

        const tableBody = document.getElementById("bilan-table-body");
        tableBody.innerHTML = ""; 
        
        quizQuestions.forEach(q => {
            const row = document.createElement("tr");
            row.className = q.status === "correct" ? "row-correct" : (q.status === "skipped" ? "row-skipped" : "row-incorrect");
            const badgeCorrection = q.status === "correct" ? `<span>Correct ✅</span>` : `<div class="math-line" style="font-weight:bold; color:#ff453a;">${q.answer}</div>`;
            row.innerHTML = `<td><strong>${q.type}</strong></td><td>${q.display}</td><td><div class="math-line">${q.savedAns}</div></td><td>${badgeCorrection}</td>`;
            tableBody.appendChild(row);
        });
    }

    document.getElementById("user-answer").addEventListener("keyup", (e) => { if (e.key === "Enter") submitAnswer(); });
</script>
</body>
</html>
